version: 2

project_name: nazar

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: nazar
    main: ./cmd/nazar
    binary: nazar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: nazar
    builds: [nazar]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: umutciftci
    name: nazar
  draft: false
  prerelease: auto   # v0.x tags are marked pre-release automatically

brews:
  - name: nazar
    repository:
      owner: umutciftci
      name: homebrew-nazar
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update nazar to {{ .Tag }}"
    homepage: "https://github.com/umutciftci/nazar"
    description: "Multi-project, zero-config, local-first vulnerability scanner."
    license: "MIT"
    install: |
      bin.install "nazar"
    test: |
      system "#{bin}/nazar", "--version"
