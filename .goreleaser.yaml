version: 2

project_name: nazar

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: nazar
    main: ./cmd/nazar
    binary: nazar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: nazar
    builds: [nazar]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    artifacts: checksum
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

release:
  github:
    owner: umutciftci
    name: nazar
  draft: false
  prerelease: auto

dockers:
  - image_templates:
      - "ghcr.io/umutciftci/nazar:{{ .Tag }}-amd64"
      - "ghcr.io/umutciftci/nazar:v{{ .Major }}.{{ .Minor }}.{{ .Patch }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title=nazar"
      - "--label=org.opencontainers.image.description=Multi-project vulnerability scanner"
      - "--label=org.opencontainers.image.url=https://github.com/umutciftci/nazar"
      - "--label=org.opencontainers.image.source=https://github.com/umutciftci/nazar"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "ghcr.io/umutciftci/nazar:{{ .Tag }}-arm64"
      - "ghcr.io/umutciftci/nazar:v{{ .Major }}.{{ .Minor }}.{{ .Patch }}-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title=nazar"
      - "--label=org.opencontainers.image.description=Multi-project vulnerability scanner"
      - "--label=org.opencontainers.image.url=https://github.com/umutciftci/nazar"
      - "--label=org.opencontainers.image.source=https://github.com/umutciftci/nazar"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/umutciftci/nazar:{{ .Tag }}"
    image_templates:
      - "ghcr.io/umutciftci/nazar:{{ .Tag }}-amd64"
      - "ghcr.io/umutciftci/nazar:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/umutciftci/nazar:latest"
    image_templates:
      - "ghcr.io/umutciftci/nazar:{{ .Tag }}-amd64"
      - "ghcr.io/umutciftci/nazar:{{ .Tag }}-arm64"

brews:
  - name: nazar
    repository:
      owner: umutciftci
      name: homebrew-nazar
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update nazar to {{ .Tag }}"
    homepage: "https://github.com/umutciftci/nazar"
    description: "Multi-project, zero-config, local-first vulnerability scanner."
    license: "MIT"
    install: |
      bin.install "nazar"
    test: |
      system "#{bin}/nazar", "--version"

scoops:
  - name: nazar
    repository:
      owner: umutciftci
      name: scoop-nazar
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update nazar to {{ .Tag }}"
    homepage: "https://github.com/umutciftci/nazar"
    description: "Multi-project, zero-config, local-first vulnerability scanner."
    license: "MIT"
    persist: []

nfpms:
  - id: nazar
    package_name: nazar
    builds:
      - nazar
    vendor: umutciftci
    homepage: "https://github.com/umutciftci/nazar"
    maintainer: "Umut Ciftci <umutciftci@users.noreply.github.com>"
    description: "Multi-project, zero-config, local-first vulnerability scanner."
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
